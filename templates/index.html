<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пошук Area Code США</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 0 auto; padding: 30px; text-align: center; background-color: #f4f4f9;}
        h1 { color: #333; }
        #map { height: 500px; width: 100%; margin-top: 20px; border-radius: 12px; border: 2px solid #ddd; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .controls { margin: 25px 0; display: flex; justify-content: center; gap: 10px; }
        input { padding: 12px; font-size: 16px; width: 250px; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 6px; transition: background 0.3s; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 15px; font-size: 20px; font-weight: 500; min-height: 30px; color: #2c3e50; }
        .error { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Де знаходиться цей телефонний код?</h1>
    
    <div class="controls">
        <input type="text" id="areaCode" placeholder="Код (напр. 310, 212, 404)" maxlength="3">
        <button onclick="findArea()">Пошук</button>
    </div>

    <div id="result">Очікування вводу...</div>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([39.8283, -98.5795], 4);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let marker = null;

        async function findArea() {
            const codeInput = document.getElementById('areaCode').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!codeInput) {
                resultDiv.innerHTML = '<span class="error">Будь ласка, введіть код.</span>';
                return;
            }

            try {
                const response = await fetch(`/api/lookup?code=${codeInput}`);
                const data = await response.json();

                if (data.success) {
                    const info = data.data;
                    
                    resultDiv.innerHTML = `Штат: <b>${info.state}</b> | Найбільше місто: <b>${info.city}</b>`;
                    
                    if (marker) map.removeLayer(marker);
                    
                    
                    marker = L.marker([info.lat, info.lon]).addTo(map)
                        .bindPopup(`<b>${info.city}</b><br>${info.state}<br>Код: ${codeInput}`)
                        .openPopup();
                        
                
                    map.flyTo([info.lat, info.lon], 8, {
                        animate: true,
                        duration: 1.5
                    });
                    
                } else {
                    resultDiv.innerHTML = `<span class="error">${data.error}</span>`;
                }
            } catch (error) {
                resultDiv.innerHTML = '<span class="error">Помилка з\'єднання з сервером.</span>';
            }
        }
        
        document.getElementById('areaCode').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') findArea();
        });
    </script>

</body>
</html>
