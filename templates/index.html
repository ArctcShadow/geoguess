<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGuessr Meta Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; text-align: center; background-color: #1e1e2e; color: #cdd6f4;}
        h1 { color: #89b4fa; }
        #map { height: 500px; width: 100%; margin-top: 20px; border-radius: 12px; border: 2px solid #45475a; }
        .tabs { margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: #313244; color: #cdd6f4; border: none; border-radius: 6px; cursor: pointer; margin: 0 5px; font-weight: bold;}
        .tab-btn.active { background: #89b4fa; color: #1e1e2e; }
        .controls { margin: 20px 0; display: flex; justify-content: center; gap: 10px; }
        input { padding: 12px; font-size: 16px; width: 300px; border: none; border-radius: 6px; background: #313244; color: #cdd6f4; outline: none;}
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background-color: #a6e3a1; color: #1e1e2e; border: none; border-radius: 6px; font-weight: bold;}
        #result { margin-top: 15px; font-size: 18px; min-height: 30px; color: #f38ba8; }
        .success-text { color: #a6e3a1; }
    </style>
</head>
<body>

    <h1>GeoGuessr Meta Tracker</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchMode('usa')" id="btn-usa">Коди США/Канада</button>
        <button class="tab-btn" onclick="switchMode('indo')" id="btn-indo">Індонезія (Kabupaten)</button>
    </div>
    
    <div class="controls">
        <input type="text" id="searchInput" placeholder="Код (напр. 310)" autocomplete="off">
        <button onclick="performSearch()">Пошук</button>
    </div>

    <div id="result">Оберіть режим та введіть дані...</div>
    <div id="map"></div>

    <script>
        let currentMode = 'usa';
        const map = L.map('map').setView([39.8283, -98.5795], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);
        let marker = null;

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btn-usa').classList.remove('active');
            document.getElementById('btn-indo').classList.remove('active');
            document.getElementById(`btn-${mode}`).classList.add('active');
            
            const input = document.getElementById('searchInput');
            if (mode === 'usa') {
                input.placeholder = "Код (напр. 310, 212)";
                map.flyTo([39.8283, -98.5795], 4, {duration: 1});
            } else {
                input.placeholder = "Назва (напр. Malang, Bogor)";
                map.flyTo([-0.7893, 113.9213], 5, {duration: 1}); // Центр Індонезії
            }
            document.getElementById('result').innerHTML = '';
            input.value = '';
            input.focus();
        }

        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!query) return;

            try {
                let url = currentMode === 'usa' ? `/api/lookup?code=${query}` : `/api/indo?q=${query}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.success) {
                    const info = data.data;
                    
                    if (marker) map.removeLayer(marker);
                    
                    if (currentMode === 'usa') {
                        resultDiv.innerHTML = `<span class="success-text">Штат: ${info.state} | Місто: ${info.city}</span>`;
                        marker = L.marker([info.lat, info.lon]).addTo(map)
                            .bindPopup(`<b>${info.city}</b><br>${info.state}`).openPopup();
                        map.flyTo([info.lat, info.lon], 8);
                    } else {
                        resultDiv.innerHTML = `<span class="success-text">Округ: ${info.name} | Острів: ${info.island}</span>`;
                        marker = L.marker([info.lat, info.lon]).addTo(map)
                            .bindPopup(`<b>${info.name}</b><br>Острів: ${info.island}`).openPopup();
                        map.flyTo([info.lat, info.lon], 9);
                    }
                } else {
                    resultDiv.innerHTML = data.error;
                }
            } catch (error) {
                resultDiv.innerHTML = 'Помилка сервера.';
            }
        }
        
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') performSearch();
        });
    </script>

</body>
</html>
